# GPU 시뮬레이션 워크로드 — Deployment.
# healthy(gpu-verify): cbor(CUDA verify)가 정상 실행 후 컨테이너 유지 → Running/Healthy.
# broken(cuda-mismatch): nvidia 런타임 prestart hook이 CUDA>드라이버라 컨테이너 생성을 거부 → CrashLoopBackOff(events).
# Deployment라 이미지 변경=인플레이스 롤링, 롤백 깨끗(불변 Job/Replace 문제 없음).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sim
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.sim.replicas }}
  # GPU 1개 환경: 업데이트 시 옛 파드를 먼저 비워 GPU를 풀어야 새 파드가 스케줄됨.
  # maxUnavailable=100%, maxSurge=0 → 옛 파드 전부 종료 후 새로 생성(Recreate처럼 동작하되
  # type은 RollingUpdate라 ServerSideApply 필드 충돌 없음). 단일 GPU 교착 방지.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
      maxSurge: 0
  selector:
    matchLabels:
      app: {{ .Release.Name }}
      role: sim
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        role: sim
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: sim
          image: "{{ .Values.sim.image.repository }}:{{ .Values.sim.image.tag }}"
          imagePullPolicy: Always
          # cbor는 1회 실행 후 종료 → Deployment에서 Running 유지를 위해 종료 후 hold.
          command: ["sh", "-c", "./cbor || true; echo '[gpu-sim] CUDA check complete; holding'; sleep infinity"]
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.sim.gpuPerPod }}
