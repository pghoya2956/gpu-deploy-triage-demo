# GPU 시뮬레이션 Job — healthy면 완료, CUDA 불일치면 CrashLoopBackOff.
# restartPolicy: OnFailure → 실패 시 같은 파드 재시작 → CrashLoopBackOff(restarts 증가), mock-data와 동형.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-sim
  labels:
    app: {{ .Release.Name }}
spec:
  parallelism: {{ .Values.sim.parallelism }}
  completions: {{ .Values.sim.parallelism }}
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: sim
          image: "{{ .Values.sim.image.repository }}:{{ .Values.sim.image.tag }}"
          imagePullPolicy: Always
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.sim.gpuPerPod }}
