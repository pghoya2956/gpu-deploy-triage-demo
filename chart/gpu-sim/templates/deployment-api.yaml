{{- if .Values.api.enabled }}
# н•ӯмғҒ Healthyн•ң API вҖ” ArgoCD л·°м—җм„ң "Jobл§Ң Degraded, DeploymentлҠ” Healthy"лҘј mock-dataмІҳлҹј ліҙмқҙкІҢ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: 80
{{- end }}
